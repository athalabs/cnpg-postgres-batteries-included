name: Build and publish image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-bake.hcl
      - .github/workflows/bake.yml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - docker-bake.hcl
      - .github/workflows/bake.yml
  schedule:
    # Weekly rebuild to pick up upstream CNPG / PostGIS / PGDG security patches.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}/cnpg-postgres-batteries-included

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake (build only on PRs)
        if: github.event_name == 'pull_request'
        uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          push: false
          set: |
            *.platform=linux/amd64
            *.output=type=cacheonly

      - name: Bake (build and push)
        if: github.event_name != 'pull_request'
        uses: docker/bake-action@v5
        env:
          registry: ${{ env.REGISTRY }}
          revision: ${{ github.sha }}
        with:
          files: docker-bake.hcl
          push: true
